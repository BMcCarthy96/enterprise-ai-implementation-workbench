name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  # Build/test-time configuration. No real secrets in CI: the AI provider is
  # mocked, AWS clients point at nothing they ever call, and the session
  # secret is CI-only.
  DATABASE_URL: postgres://workbench:workbench@localhost:5432/workbench
  SESSION_SECRET: ci-only-secret-0123456789abcdef0123456789abcdef
  AWS_REGION: us-east-1
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_ENDPOINT_URL: http://localhost:4566
  S3_BUCKET: workbench-documents
  JOBS_QUEUE_URL: http://localhost:4566/000000000000/workbench-jobs
  AI_PROVIDER: mock

jobs:
  quality:
    name: Lint, typecheck, unit tests, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build

  e2e:
    name: Playwright smoke tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: workbench
          POSTGRES_PASSWORD: workbench
          POSTGRES_DB: workbench
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U workbench"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      localstack:
        image: localstack/localstack:4.6
        env:
          SERVICES: s3,sqs
        ports:
          - 4566:4566
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health || exit 1"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Provision AWS resources (LocalStack)
        env:
          AWS_ACCESS_KEY_ID: test
          AWS_SECRET_ACCESS_KEY: test
          AWS_DEFAULT_REGION: us-east-1
          ENDPOINT: http://localhost:4566
        run: |
          aws --endpoint-url=$ENDPOINT s3 mb s3://workbench-documents
          aws --endpoint-url=$ENDPOINT sqs create-queue --queue-name workbench-jobs-dlq
          aws --endpoint-url=$ENDPOINT sqs create-queue --queue-name workbench-jobs
      - name: Migrate and seed
        run: |
          npm run db:migrate
          npm run db:seed
      - name: Run e2e tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
